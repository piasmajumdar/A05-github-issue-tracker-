<!DOCTYPE html>
<html lang="en" class="bg-[#F8FAFC]">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Login</title>
    <!-- style -->
    <link rel="stylesheet" href="./style/index.css">

    <!-- DaisyUI + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--Internal Style -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <!-- Sign In Section -->
    <main class="w-[520px] mx-auto my-4 bg-white p-8 space-y-6 shadow-md rounded-lg">
        <img class="mx-auto" src="./assets/github-logo.png" alt="">
        <div>
            <h2 class="text-center font-semibold text-2xl text-[#000000]">GitHub Issues Tracker</h2>
            <h3 class="text-center text-[#64748B]">Sign in to manage your issues</h3>
        </div>

        <!-- Signin form -->
        <form class="fieldset rounded-box p-4">
            <legend class="fieldset-legend"></legend>

            <label class="text-[16px] font-medium">Username</label>
            <input type="text" class="input w-full" placeholder="Enter Username" />
            <p class="text-[14px] text-[#4A00FF]">Default: admin</p>

            <label class="text-[16px] font-medium">Password</label>
            <input type="password" class="input w-full" placeholder="Enter Password" />
            <p class="text-[14px] text-[#4A00FF]">Default: admin123</p>

            <button class="btn btn-primary mt-4 font-semibold">Sign In</button>
        </form>

        <div class="divider">OR</div>

        <div class="text-center">
            <h3 class="text-[14px] text-[#64748B]">Demo Credentials:</h3>
            <div class="py-6 bg-[#F8FAFC] rounded-lg my-2 text-[#1F2937]">
                <span class="font-semibold">Username:</span> admin
                <br>
                <span class="font-semibold">Password:</span> admin123s
            </div>
        </div>


    </main>

    <script src="./script/index.js"></script>
</body>

</html>
